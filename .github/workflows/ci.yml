# CI:push / PR 时自动跑测试、静态检查、格式检查
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: gofmt check
        # 无输出 = 格式全部规范;有输出 = 有文件需格式化,失败
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::以下文件需要 gofmt:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v
